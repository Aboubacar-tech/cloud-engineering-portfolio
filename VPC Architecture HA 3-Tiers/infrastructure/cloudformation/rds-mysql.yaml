AWSTemplateFormatVersion: "2010-09-09"

Description: >
  Private MySQL RDS Database
  deployed in private database subnets


# ==============================
# PARAMETERS
# ==============================

Parameters:


  VPCId:

    Type: AWS::EC2::VPC::Id

    Description: Production VPC ID



  DBSubnetA:

    Type: AWS::EC2::Subnet::Id

    Description: Private DB subnet AZ-A



  DBSubnetB:

    Type: AWS::EC2::Subnet::Id

    Description: Private DB subnet AZ-B



  AppSecurityGroupId:

    Type: AWS::EC2::SecurityGroup::Id

    Description: SG-AppServers



  DBUsername:

    Type: String

    Default: admin



  DBPassword:

    Type: String

    NoEcho: true

    MinLength: 8



# ==============================
# RESOURCES
# ==============================

Resources:



# ==============================
# DATABASE SECURITY GROUP
# ==============================


  DatabaseSecurityGroup:


    Type: AWS::EC2::SecurityGroup


    Properties:


      

      GroupDescription: Allow MySQL only from application servers


      VpcId:

        !Ref VPCId



      SecurityGroupIngress:


        - IpProtocol: tcp

          FromPort: 3306

          ToPort: 3306

          SourceSecurityGroupId:

            !Ref AppSecurityGroupId



      Tags:


        - Key: Name

          Value: SG-DB





# ==============================
# DB SUBNET GROUP
# ==============================


  DatabaseSubnetGroup:


    Type: AWS::RDS::DBSubnetGroup


    Properties:


      DBSubnetGroupName:

        production-db-subnet-group



      DBSubnetGroupDescription:

        Private database subnet group



      SubnetIds:


        - !Ref DBSubnetA

        - !Ref DBSubnetB





# ==============================
# MYSQL RDS INSTANCE
# ==============================


  MySQLDatabase:


    Type: AWS::RDS::DBInstance



    Properties:



      DBInstanceIdentifier:

        production-mysql



      Engine:

        mysql



      EngineVersion:

        "8.0"



      DBInstanceClass:

        db.t3.micro



      AllocatedStorage:

        20



      StorageType:

        gp3



      MasterUsername:

        !Ref DBUsername



      MasterUserPassword:

        !Ref DBPassword



      DBSubnetGroupName:


        !Ref DatabaseSubnetGroup



      VPCSecurityGroups:


        - !Ref DatabaseSecurityGroup



      PubliclyAccessible:


        false



      MultiAZ:


        true



      BackupRetentionPeriod:


        7



      StorageEncrypted:


        true



      DeletionProtection:


        false



      Tags:


        - Key: Name

          Value: production-mysql





# ==============================
# OUTPUTS
# ==============================


Outputs:



  RDSEndpoint:


    Description: MySQL Endpoint


    Value:


      !GetAtt MySQLDatabase.Endpoint.Address




  RDSPort:


    Description: MySQL Port


    Value:


      !GetAtt MySQLDatabase.Endpoint.Port




  DatabaseSecurityGroup:


    Description: Database Security Group


    Value:


      !Ref DatabaseSecurityGroup